<!doctype html>
<!-- 주행 상황(속도·날씨·장소·시간)에 맞춰 Spotify를 원격 제어해 곡을 추천·재생하는 단일 파일 웹앱 -->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<title>Drive DJ</title>
<style>
  :root { --bg:#0b0d12; --card:#151924; --fg:#e8ecf4; --mut:#8a93a6; --acc:#1db954; --ok:#3ad29f; --warn:#ffb454; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body { padding:14px; padding-bottom:40px; }
  h1 { font-size:18px; margin:0 0 10px; letter-spacing:.3px; }
  h1 span { color:var(--acc); }
  .card { background:var(--card); border-radius:14px; padding:14px; margin-bottom:12px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; }
  .stat { flex:1; min-width:80px; }
  .stat .k { font-size:11px; color:var(--mut); text-transform:uppercase; letter-spacing:.5px; }
  .stat .v { font-size:20px; font-weight:600; margin-top:2px; }
  .stat .v small { font-size:12px; color:var(--mut); font-weight:400; }
  .mood { font-size:15px; line-height:1.5; }
  .mood .q { color:var(--acc); font-weight:600; }
  button { font-size:16px; font-weight:600; border:0; border-radius:12px; padding:14px 16px;
    background:var(--acc); color:#06210f; width:100%; cursor:pointer; }
  button.ghost { background:#222838; color:var(--fg); }
  button:active { transform:scale(.99); }
  input { width:100%; font-size:15px; padding:12px; border-radius:10px; border:1px solid #2a3142;
    background:#10141d; color:var(--fg); margin-top:6px; }
  label { font-size:12px; color:var(--mut); }
  .pill { display:inline-block; font-size:12px; padding:4px 9px; border-radius:999px;
    background:#222838; color:var(--fg); margin:3px 4px 0 0; }
  #log { font-size:11px; color:var(--mut); white-space:pre-wrap; max-height:120px; overflow:auto;
    font-family:ui-monospace,Menlo,monospace; line-height:1.45; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:6px; background:var(--warn); }
  .dot.on { background:var(--ok); }
  a { color:var(--acc); }
  .hint { font-size:12px; color:var(--mut); line-height:1.5; margin-top:8px; }
  .gdrop { max-height:200px; overflow:auto; border:1px solid #2a3142; border-radius:10px; margin-top:6px; display:none; }
  .gdrop.on { display:block; }
  .gopt { padding:11px 12px; font-size:14px; border-bottom:1px solid #1c2230; cursor:pointer; }
  .gopt:active { background:#222838; }
</style>
</head>
<body>
  <h1>Drive <span>DJ</span> <small id="ver" style="font-size:11px;color:var(--mut);font-weight:400"></small></h1>

  <!-- 1) Spotify 연결 -->
  <div class="card" id="authCard">
    <label>Spotify Client ID (이 기기에만 저장)</label>
    <input id="clientId" placeholder="developer.spotify.com 앱의 Client ID" autocomplete="off" />
    <div style="height:8px"></div>
    <button id="loginBtn">Spotify 로그인</button>
    <div class="hint">Premium 필요 · 폰 Spotify 앱이 켜져 있어야 해요. 리다이렉트 URI에 <b id="redir"></b> 를 등록하세요.</div>
  </div>

  <!-- 2) 연결됨 + 주행 시작 -->
  <div class="card" id="readyCard" style="display:none">
    <div id="who" style="font-size:14px;margin-bottom:4px"></div>
    <div id="device" style="font-size:12px;color:var(--mut);margin-bottom:10px"></div>
    <button id="startBtn">▶ 주행 시작 (위치 추적)</button>
    <button class="ghost" id="logoutBtn" style="margin-top:8px">로그아웃</button>
  </div>

  <!-- 상태 패널 -->
  <div class="card">
    <div class="row">
      <div class="stat"><div class="k">속도</div><div class="v" id="spd">–<small> km/h</small></div></div>
      <div class="stat"><div class="k">날씨</div><div class="v" id="wx">–</div></div>
      <div class="stat"><div class="k">시간대</div><div class="v" id="tod">–</div></div>
    </div>
    <div style="height:10px"></div>
    <div class="stat"><div class="k">위치</div><div class="v" id="loc" style="font-size:15px">위치 권한 대기 중</div></div>
    <div style="margin-top:8px"><span class="dot" id="gpsDot"></span><span id="gpsTxt" style="font-size:12px;color:var(--mut)">GPS 미연결</span></div>
  </div>

  <!-- 무드/쿼리 -->
  <div class="card">
    <div class="k" style="font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px">지금의 무드</div>
    <div class="mood" id="moodTxt" style="margin-top:6px">상황을 분석하면 여기에 표시돼요.</div>
    <div id="pills" style="margin-top:8px"></div>
  </div>

  <!-- 장르 필터 -->
  <div class="card">
    <div class="k" style="font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px">장르 필터 (Spotify 장르에서 검색·선택)</div>
    <label>포함 — 선택한 장르만 (비우면 전체)</label>
    <input id="genreInc" placeholder="장르 검색…" autocomplete="off" />
    <div id="genreIncList" class="gdrop"></div>
    <div id="genreIncChips" style="margin-top:6px"></div>
    <label style="margin-top:10px;display:block">제외 — 선택한 장르는 뺌</label>
    <input id="genreExc" placeholder="장르 검색…" autocomplete="off" />
    <div id="genreExcList" class="gdrop"></div>
    <div id="genreExcChips" style="margin-top:6px"></div>
    <button class="ghost" id="genreApply" style="margin-top:10px">필터 적용 (재추천)</button>
  </div>

  <!-- 재생 컨트롤 -->
  <div class="card">
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
      <img id="art" alt="" style="width:68px;height:68px;border-radius:8px;background:#222838;object-fit:cover;flex:none" />
      <div style="flex:1;min-width:0">
        <div id="npTitle" style="font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">– 재생 대기 –</div>
        <div id="npArtist" style="font-size:14px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
        <div id="npState" style="font-size:11px;color:var(--mut);margin-top:3px"></div>
      </div>
    </div>
    <div class="grid2">
      <button class="ghost" id="badBtn" style="background:#3a2230">👎 싫어요</button>
      <button class="ghost" id="goodBtn" style="background:#1f3a2e">👍 좋아요</button>
    </div>
    <div class="grid2" style="margin-top:10px">
      <button class="ghost" id="skipBtn">⏭ 다음 곡</button>
      <button class="ghost" id="refreshBtn">↻ 지금 상황 반영</button>
    </div>
    <div id="prefStat" style="font-size:12px;color:var(--mut);margin-top:8px"></div>
    <button class="ghost" id="prefToggle" style="margin-top:8px;font-size:13px;padding:9px">취향 목록 보기</button>
    <div id="prefPanel" style="display:none;margin-top:8px;font-size:12px;line-height:1.7"></div>
  </div>

  <div class="card">
    <div class="k" style="font-size:11px;color:var(--mut)">로그</div>
    <div id="log"></div>
  </div>

<script>
// ===== 유틸 =====
const VERSION = 'v29';
const $ = id => document.getElementById(id);
const log = m => { const el=$('log'); const t=new Date().toTimeString().slice(0,8);
  el.textContent = `[${t}] ${m}\n` + el.textContent; };

// ===== 상태 =====
let lastFix=null, speedSamples=[], lastSignature=null, lastFetchTs=0, geocodeTs=0;
let curContext={ speedKmh:0, weather:null, tod:null, place:null, placeType:'city' };
let candMeta={};          // uri -> {name, artist, aid, genres}
let trackData={};         // uri -> Spotify 원본 필드(enrich 전송용)
let pendingUris=null;     // 현재 곡 끝나면 반영할 다음 추천
let queueUris=[];         // 지금 재생 중인 추천 목록 (스킵 시 다음 곡 계산용)
let deviceId=null;
let nowState={ playing:false, uri:null, dur:0, prog:0, name:'', artist:'' };
let lastUri=null, lastArtist=null;
let trackStartTs=0, skipFlag=false, forceFlag=false;  // 완청/스킵/강제교체 구분

// ===== 취향 =====
// prefs: blocked(제외 곡), fav("아티스트 / 장르" 결합 카테고리 점수), liked(좋아요 곡)
let prefs = loadPrefs();
function loadPrefs(){ try{ const p=JSON.parse(localStorage.getItem('djPrefsSp'))||{}; return {blocked:p.blocked||{}, fav:p.fav||{}, liked:p.liked||{}}; }catch(e){ return {blocked:{},fav:{},liked:{}}; } }
function savePrefs(){ localStorage.setItem('djPrefsSp', JSON.stringify(prefs)); renderPref(); }
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i];a[i]=a[j];a[j]=t; } return a; }

// "아티스트 + 장르"를 하나의 결합 카테고리로 (장르 여러개면 각각)
function catsOf(uri){
  const m=candMeta[uri]||{}; const ar=m.artist||'(unknown)';
  const gs=(m.genres&&m.genres.length)?m.genres:['(unknown)'];
  return gs.map(g=> ar+' / '+g);
}
function bumpFav(uri, d){ catsOf(uri).forEach(c=>{ prefs.fav[c]=(prefs.fav[c]||0)+d; }); }
function penalizeFav(uri, pen){ catsOf(uri).forEach(c=>{ if(prefs.fav[c]!==undefined) prefs.fav[c]-=pen; }); }  // 이미 점수 있는 것만 감점
function scoreTrack(uri){ let s=0; catsOf(uri).forEach(c=> s+=prefs.fav[c]||0); return s; }

function renderPref(){
  const favN=Object.values(prefs.fav).filter(v=>v>0).length;
  $('prefStat').textContent = `취향 — 선호 ${favN} · 좋아요 ${Object.keys(prefs.liked).length} · 제외 ${Object.keys(prefs.blocked).length}`;
  if($('prefPanel').style.display!=='none') renderPrefPanel();
}
function renderPrefPanel(){
  const favs=Object.entries(prefs.fav).sort((a,b)=>b[1]-a[1]);
  const liked=Object.entries(prefs.liked);
  const blocked=Object.entries(prefs.blocked);
  let h='<div style="color:var(--fg);font-weight:600;margin:4px 0">⭐ 선호 (아티스트 / 장르)</div>';
  h+= favs.length ? favs.map(([c,v])=>`<div style="margin:2px 0">${esc(c)} <span style="color:var(--mut)">${v>0?'+':''}${v.toFixed(1)}</span> <a href="#" data-delfav="${esc(c)}" style="color:var(--acc)">[삭제]</a></div>`).join('')
                  : '<div style="color:var(--mut)">아직 없음</div>';
  h+='<div style="color:var(--fg);font-weight:600;margin:12px 0 4px">👍 좋아요 곡 <span style="font-weight:400;color:var(--mut)">(곡 클릭 → 다음 큐)</span></div>';
  h+= liked.length ? liked.map(([uri,m])=>`<div style="margin:2px 0"><a href="#" data-queue="${esc(uri)}" style="color:var(--fg)">${esc(m.name||uri)}</a> <span style="color:var(--mut)">${esc(m.artist||'')}</span> <a href="#" data-delliked="${esc(uri)}" style="color:var(--acc)">[삭제]</a></div>`).join('')
                   : '<div style="color:var(--mut)">없음</div>';
  h+='<div style="color:var(--fg);font-weight:600;margin:12px 0 4px">🚫 제외 곡 <span style="font-weight:400;color:var(--mut)">(곡 클릭 → 다음 큐)</span></div>';
  h+= blocked.length ? blocked.map(([uri,name])=>`<div style="margin:2px 0"><a href="#" data-queue="${esc(uri)}" style="color:var(--fg)">${esc(typeof name==='string'?name:uri)}</a> <a href="#" data-unblock="${esc(uri)}" style="color:var(--acc)">[해제]</a></div>`).join('')
                     : '<div style="color:var(--mut)">없음</div>';
  $('prefPanel').innerHTML=h;
}

// =====================================================================
//  Spotify OAuth (PKCE) + Web API 원격 제어
// =====================================================================
const REDIRECT = location.origin + location.pathname;
const SCOPES = 'user-read-private user-read-playback-state user-modify-playback-state user-read-currently-playing';
let tokens = (()=>{ try{ return JSON.parse(localStorage.getItem('sp_tok'))||{}; }catch(e){ return {}; } })();

function rand(n){ const a=new Uint8Array(n); crypto.getRandomValues(a); return Array.from(a,b=>('0'+b.toString(16)).slice(-2)).join(''); }
async function sha256b64(s){
  const d=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return btoa(String.fromCharCode.apply(null, new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
async function login(){
  const cid=$('clientId').value.trim(); if(!cid){ alert('Client ID를 입력하세요'); return; }
  localStorage.setItem('sp_cid', cid);
  const verifier=rand(48); localStorage.setItem('sp_verifier', verifier);
  const challenge=await sha256b64(verifier);
  const p=new URLSearchParams({ client_id:cid, response_type:'code', redirect_uri:REDIRECT,
    scope:SCOPES, code_challenge_method:'S256', code_challenge:challenge });
  location.href='https://accounts.spotify.com/authorize?'+p.toString();
}
async function exchangeCode(code){
  const cid=localStorage.getItem('sp_cid'), verifier=localStorage.getItem('sp_verifier');
  const body=new URLSearchParams({ grant_type:'authorization_code', code, redirect_uri:REDIRECT, client_id:cid, code_verifier:verifier });
  const j=await (await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body})).json();
  if(j.access_token){ storeTokens(j); } else { log('토큰 교환 실패: '+(j.error_description||j.error||'?')); }
}
function storeTokens(j){
  tokens.access=j.access_token;
  if(j.refresh_token) tokens.refresh=j.refresh_token;
  tokens.exp=Date.now()+((j.expires_in||3600)-60)*1000;
  localStorage.setItem('sp_tok', JSON.stringify(tokens));
}
async function refreshToken(){
  const cid=localStorage.getItem('sp_cid');
  const body=new URLSearchParams({ grant_type:'refresh_token', refresh_token:tokens.refresh, client_id:cid });
  const j=await (await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body})).json();
  if(j.access_token) storeTokens(j); else log('토큰 갱신 실패 — 다시 로그인 필요');
}
async function token(){
  if(!tokens.access) return null;
  if(Date.now()>tokens.exp && tokens.refresh) await refreshToken();
  return tokens.access;
}
async function api(path, opts){
  opts=opts||{};
  const t=await token(); if(!t) throw Object.assign(new Error('no token'),{status:401});
  opts.headers=Object.assign({'Authorization':'Bearer '+t}, opts.headers||{});
  const r=await fetch('https://api.spotify.com/v1'+path, opts);
  if(r.status===204) return null;
  const txt=await r.text(); let j=null; try{ j=txt?JSON.parse(txt):null; }catch(e){}
  if(!r.ok){ throw Object.assign(new Error((j&&j.error&&j.error.message)||('HTTP '+r.status)), {status:r.status, path:path}); }
  return j;
}

async function showProfile(){
  try{ const me=await api('/me'); $('who').textContent='✓ '+(me.display_name||me.id)+' ('+(me.product||'?')+')';
    if(me.product!=='premium') log('⚠️ Premium이 아니면 재생 제어가 막힐 수 있어요'); }
  catch(e){ $('who').textContent='✓ 연결됨'; }
}
async function pickDevice(){
  const j=await api('/me/player/devices');
  const ds=(j&&j.devices)||[];
  if(!ds.length){ deviceId=null; $('device').textContent='기기 없음 — 폰 Spotify 앱에서 아무 곡이나 재생하세요'; return null; }
  const dev=ds.find(d=>d.is_active) || ds.find(d=>d.type==='Smartphone') || ds[0];
  deviceId=dev.id; $('device').textContent='기기: '+dev.name+(dev.is_active?' (활성)':'');
  return dev;
}
async function playUris(uris){
  await api('/me/player/play'+(deviceId?('?device_id='+deviceId):''),
    {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({uris})});
}
// 새 추천 목록으로 재생 시작 (스킵 계산을 위해 목록 보관)
function setQueueAndPlay(uris){ queueUris=uris.slice(); return playUris(uris); }

// ===== 거리 (Haversine, m) =====
function haversine(a,b){
  const R=6371000, toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLon=toR(b.lon-a.lon);
  const s=Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
// ===== 시간대 =====
function timeOfDay(){ const h=new Date().getHours();
  if(h<6) return {key:'dawn', ko:'새벽', en:'early morning'}; if(h<11) return {key:'morning', ko:'아침', en:'morning'};
  if(h<17) return {key:'day', ko:'낮', en:'daytime'}; if(h<20) return {key:'evening', ko:'저녁', en:'sunset'};
  return {key:'night', ko:'밤', en:'night'}; }
// ===== 속도 4구간 =====
function speedBucket(kmh){
  if(kmh<=20) return {key:'idle',    ko:'정체',     en:'chill',                koMood:'잔잔한'};
  if(kmh<=60) return {key:'cruise',  ko:'주행',     en:'groovy mid-tempo',     koMood:'기분좋은'};
  if(kmh<=90) return {key:'fast',    ko:'빠른주행', en:'upbeat',               koMood:'감성'};
  return         {key:'highway', ko:'고속도로', en:'high energy driving',  koMood:'신나는'}; }
// ===== WMO 날씨코드 → 무드 =====
function weatherFromCode(code, isDay){
  if(code===0) return {key:'clear', ko:isDay?'맑음':'맑은 밤', en:'bright'};
  if(code<=3) return {key:'cloudy', ko:'구름', en:'mellow'};
  if(code===45||code===48) return {key:'fog', ko:'안개', en:'dreamy'};
  if(code>=51&&code<=67) return {key:'rain', ko:'비', en:'rainy'};
  if(code>=71&&code<=77) return {key:'snow', ko:'눈', en:'snowy'};
  if(code>=80&&code<=82) return {key:'rain', ko:'소나기', en:'rainy'};
  if(code>=85&&code<=86) return {key:'snow', ko:'눈', en:'snowy'};
  if(code>=95) return {key:'storm', ko:'뇌우', en:'stormy'};
  return {key:'clear', ko:'–', en:''}; }
// ===== 날씨 (Open-Meteo, 키 불필요) =====
async function fetchWeather(lat,lon){
  try{ const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,is_day`;
    const j=await (await fetch(u)).json(); const c=j.current;
    const w=weatherFromCode(c.weather_code, c.is_day===1); w.temp=Math.round(c.temperature_2m); return w;
  }catch(e){ log('날씨 실패: '+e.message); return null; } }
// ===== 역지오코딩 (Nominatim) =====
async function fetchPlace(lat,lon){
  try{ const u=`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=14&accept-language=ko`;
    const j=await (await fetch(u)).json(); const a=j.address||{};
    const name=a.city||a.town||a.village||a.county||a.suburb||a.road||j.name||'알 수 없음';
    const cat=(j.category||'')+' '+(j.type||'')+' '+(a.natural||''); let type='city';
    if(/coast|beach|bay|water|sea|harbour/i.test(cat)||a.natural==='water') type='coast';
    else if(/peak|mountain|forest|wood|natural/i.test(cat)) type='mountain';
    else if(/motorway|trunk/i.test(a.road||'')) type='highway';
    else if(a.village||a.hamlet||a.farm) type='rural';
    return {name, type};
  }catch(e){ log('장소 실패: '+e.message); return null; } }
const placeWord = { coast:'해안도로', mountain:'산길', highway:'고속도로', rural:'시골길', city:'도심' };  // 화면 표시용(한국어)

// ===== 무드 → 검색 쿼리 (우선순위: 위치 > 날씨 > 시간 > 속도) =====
// 트랙 검색용 — 무드 위주(장소는 트랙명 매칭에 안 맞아 제외)
function buildQueryEn(ctx){
  const sb=speedBucket(ctx.speedKmh);
  return [ ctx.weather?ctx.weather.en:'', ctx.tod?ctx.tod.en:'', sb.en ].filter(Boolean).join(' ');
}
function buildQueryKo(ctx){
  const sb=speedBucket(ctx.speedKmh);
  const wko=(ctx.weather&&ctx.weather.ko!=='–')?ctx.weather.ko:'';
  return [ wko, ctx.tod?ctx.tod.ko:'', sb.koMood ].filter(Boolean).join(' ');
}
// 시그니처도 우선순위 순서로 (변화 감지용)
function signature(ctx){
  return [ ctx.placeType, ctx.weather?ctx.weather.key:'?', ctx.tod?ctx.tod.key:'?', speedBucket(ctx.speedKmh).key ].join('|');
}

// Spotify 트랙 객체 → track_facts/enrich용 필드
function spotifyFields(tr){
  const rd=tr.album&&tr.album.release_date;
  return {
    id: tr.id,
    isrc: (tr.external_ids&&tr.external_ids.isrc)||null,
    name: tr.name,
    artists: (tr.artists||[]).map(a=>a.name),
    artist_ids: (tr.artists||[]).map(a=>a.id),
    album: (tr.album&&tr.album.name)||null,
    release_year: rd? parseInt(String(rd).slice(0,4))||null : null,
    duration_ms: tr.duration_ms||null,
    popularity: (tr.popularity!=null)?tr.popularity:null,
    explicit: !!tr.explicit
  };
}
// 최종 곡들을 enrich 함수로 보내 속성 채움+캐싱 (백그라운드, 재생 안 막음)
async function enrichTracks(uris){
  try{
    const tracks=uris.map(u=>{ const d=trackData[u]; if(!d) return null;
      return Object.assign({}, d, { genres:(candMeta[u]&&candMeta[u].genres)||null }); }).filter(Boolean);
    if(!tracks.length) return;
    const r=await fetch(SUPA_URL+'/functions/v1/enrich',{ method:'POST',
      headers:{ 'Authorization':'Bearer '+SUPA_ANON, 'Content-Type':'application/json' },
      body:JSON.stringify({ tracks }) });
    const j=await r.json();
    if(j.error) log('enrich 오류: '+j.error);
    else log('속성 캐싱 '+Object.keys(j.facts||{}).length+'곡 (신규분석 '+(j.enriched||0)+')');
  }catch(e){ log('enrich 실패: '+e.message); }
}
// YouTube 영상 제목 → Spotify 검색용으로 정리
function cleanTitle(t){
  return String(t)
    .replace(/\[[^\]]*\]|\([^)]*\)|\{[^}]*\}/g,' ')
    .replace(/official|video|audio|lyrics?|m\/?v|뮤직비디오|가사|live|color\s*coded|teaser|performance|hd|4k|fmv/gi,' ')
    .replace(/[|·_]+/g,' ').replace(/\s+/g,' ').trim();
}
// 매칭 검증 — Spotify 곡명+아티스트가 YouTube 제목 안에 충분히 들어있어야 같은 곡으로 인정
function tokz(s){ return String(s).toLowerCase().replace(/[^\p{L}\p{N}]+/gu,' ').split(' ').filter(w=>w.length>1); }
function isGoodMatch(ytTitle, tr){
  const hay=tokz(ytTitle);
  const need=tokz(tr.name).concat(tokz((tr.artists&&tr.artists[0]&&tr.artists[0].name)||''));
  if(!need.length || !hay.length) return false;
  const hit=need.filter(w=>hay.indexOf(w)>=0).length;
  return hit/need.length >= 0.5;   // 곡명+아티스트 토큰의 절반 이상 일치해야 인정
}
// 매칭된 곡들의 아티스트 장르 조회 (50명씩 배치)
async function fetchGenres(uris){
  const ids=Array.from(new Set(uris.map(u=>candMeta[u]&&candMeta[u].aid).filter(Boolean)));
  const gmap={};
  for(let i=0;i<ids.length;i+=50){
    try{ const j=await api('/artists?ids='+ids.slice(i,i+50).join(',')); (j.artists||[]).forEach(a=>{ if(a) gmap[a.id]=a.genres||[]; }); }
    catch(e){ log('장르조회 실패: '+(e.message||e)); }
  }
  return gmap;
}
// 장르 선택 상태 + 알려진 장르 목록(기본 + 곡에서 발견한 것 누적 → 실제 존재 장르만 선택)
function loadArr(k){ try{ return JSON.parse(localStorage.getItem(k))||[]; }catch(e){ return []; } }
let incSel = loadArr('genre_inc'), excSel = loadArr('genre_exc');
const BASE_GENRES = ['k-pop','k-rap','korean r&b','korean pop','korean ost','k-indie','trot','pop','dance pop','electropop','synth-pop','city pop','indie pop','indie rock','rock','alternative rock','r&b','hip hop','rap','trap','edm','house','deep house','lo-fi','jazz','soul','funk','classical','acoustic','ballad','singer-songwriter','folk','metal','punk','reggae','latin','j-pop','j-rock','anime','soundtrack','chill','ambient','bedroom pop','disco','blues','country'];
let knownGenres = (()=>{ const s=new Set(BASE_GENRES); loadArr('seenGenres').forEach(g=>s.add(g)); incSel.concat(excSel).forEach(g=>s.add(g)); return s; })();
function getGenreList(which){ return which==='inc'?incSel:excSel; }
// 입력값 부분일치로 장르 후보 목록 표시 (직접 만든 검색 드롭다운)
function filterGenres(which, q){
  const listEl=$(which==='inc'?'genreIncList':'genreExcList');
  q=(q||'').trim().toLowerCase();
  const sel = which==='inc'?incSel:excSel;
  let list = Array.from(knownGenres).filter(g=> sel.indexOf(g)<0);
  if(q) list = list.filter(g=> g.indexOf(q)>=0);
  list = list.sort().slice(0,50);
  if(!list.length){ listEl.classList.remove('on'); listEl.innerHTML=''; return; }
  listEl.innerHTML = list.map(g=>`<div class="gopt" data-gadd="${which}:::${esc(g)}">${esc(g)}</div>`).join('');
  listEl.classList.add('on');
}
function renderGenreChips(){
  const mk=(arr,which)=> arr.map((g,i)=>`<span class="pill" style="cursor:pointer" data-gdel="${which}:${i}">${esc(g)} ✕</span>`).join('') || '<span style="font-size:11px;color:var(--mut)">없음</span>';
  $('genreIncChips').innerHTML=mk(incSel,'inc'); $('genreExcChips').innerHTML=mk(excSel,'exc');
}
function addGenre(which, val){
  const g=(val||'').trim().toLowerCase(); if(!g) return;
  const arr = which==='inc'?incSel:excSel;
  if(arr.indexOf(g)<0){ arr.push(g); knownGenres.add(g); localStorage.setItem('genre_'+which, JSON.stringify(arr)); renderGenreChips(); }
}
function removeGenre(which, i){ const arr = which==='inc'?incSel:excSel; arr.splice(i,1); localStorage.setItem('genre_'+which, JSON.stringify(arr)); renderGenreChips(); }
// 동시 실행 제한 (Spotify 검색 폭주 방지)
async function mapLimit(arr, limit, fn){
  let i=0;
  async function w(){ while(i<arr.length){ const x=arr[i++]; await fn(x); } }
  await Promise.all(Array.from({length:Math.min(limit, arr.length||1)}, w));
}

// =====================================================================
//  추천: YouTube로 무드곡 제목 수집 → Spotify에서 같은 곡 찾아 재생
// =====================================================================
async function searchAndPlay(force){
  if(!tokens.access){ log('Spotify 로그인 필요'); return; }
  const now=Date.now(); if(!force && now-lastFetchTs<45000) return; lastFetchTs=now;
  try{
    const dev=await pickDevice();
    if(!dev){ log('⚠️ 활성 기기 없음 — 폰 Spotify에서 곡 재생 후 "↻"'); return; }

    const N=40, koN=20, foN=20;   // 한/영 절반씩 수집해 섞음
    // 1) YouTube에서 무드 플레이리스트 채굴 → 곡 제목 수집 (백엔드가 키 들고 처리)
    const koQ=buildQueryKo(curContext)+' 노래', foQ=buildQueryEn(curContext)+' songs';
    const res=await ytTitlesBackend([koQ, foQ]);
    const koT=res[koQ]||[], foT=res[foQ]||[];
    log(`YouTube 수집 — 한국 ${koT.length}/해외 ${foT.length} 제목`);
    const cand = shuffle(koT).slice(0, koN*2).concat(shuffle(foT).slice(0, foN*2));  // 매칭 실패 대비 2배수
    if(!cand.length){ log('YouTube 곡 없음 (키/쿼터 확인)'); return; }

    // 2) Spotify에서 같은 곡 검색 → URI 확보
    const uris=[], meta={}; trackData={}; let tried=0, miss=0;
    await mapLimit(cand, 6, async (t)=>{
      const q=cleanTitle(t); if(!q) return; tried++;
      try{ const tj=await api('/search?type=track&market=KR&q='+encodeURIComponent(q));
        const items=(tj&&tj.tracks&&tj.tracks.items)||[];
        // 정확히 일치하는 곡만 채택 — 없으면 유사곡 대신 건너뜀
        const tr=items.find(x=> x&&x.uri && isGoodMatch(t, x));
        if(tr && !prefs.blocked[tr.uri] && !meta[tr.uri]){
          meta[tr.uri]={name:tr.name, artist:(tr.artists&&tr.artists[0]&&tr.artists[0].name)||'', aid:(tr.artists&&tr.artists[0]&&tr.artists[0].id)||''};
          trackData[tr.uri]=spotifyFields(tr);
          uris.push(tr.uri);
        }
        else miss++;
      }catch(e){ miss++; }
    });
    candMeta=meta;
    if(!uris.length){ log('Spotify 정확매칭 0곡 (유사곡 추가 안 함)'); return; }

    // 3) 아티스트 장르 확인 → 포함/제외 필터
    const gmap=await fetchGenres(uris);
    const inc=getGenreList('inc'), exc=getGenreList('exc');
    const seen={}; let excluded=0, noGenre=0;
    const kept=uris.filter(u=>{
      const gs=(gmap[meta[u].aid]||[]).map(g=>g.toLowerCase());
      meta[u].genres=gs;   // 점수계산(결합 카테고리)용으로 저장
      gs.forEach(g=>seen[g]=(seen[g]||0)+1);
      if(!gs.length){ noGenre++; return inc.length? false : true; }  // 장르정보 없음: 포함필터 있으면 제외
      if(exc.length && gs.some(g=>exc.some(x=>g.indexOf(x)>=0))){ excluded++; return false; }
      if(inc.length && !gs.some(g=>inc.some(x=>g.indexOf(x)>=0))) return false;
      return true;
    });
    // 발견된 장르를 드롭다운 목록에 누적 (실제 존재하는 장르만 선택 가능 → 오매칭 방지)
    let gAdded=false; Object.keys(seen).forEach(g=>{ if(!knownGenres.has(g)){ knownGenres.add(g); gAdded=true; } });
    if(gAdded){ localStorage.setItem('seenGenres', JSON.stringify(Array.from(knownGenres))); }

    // 선호 점수(아티스트/장르 결합) 높은 순 + 약간의 랜덤(다양성)
    const final=kept.sort((a,b)=> (scoreTrack(b)+Math.random()) - (scoreTrack(a)+Math.random())).slice(0,N);
    log(`매칭 ${uris.length} → 장르필터 후 ${final.length}곡`+((inc.length||exc.length)?` (제외 ${excluded}, 장르없음 ${noGenre})`:''));
    if(!final.length){ log('필터 통과 곡 없음 — 포함 장르를 비우거나 완화하세요'); return; }
    applyOrQueue(final, force);
    enrichTracks(final);   // 속성 채워 track_facts에 캐싱 (백그라운드)
  }catch(e){
    if(e.status===401) log('인증 만료 — 다시 로그인하세요');
    else if(e.status===403) log('⚠️ 권한/Premium 문제: '+e.message);
    else if(e.status===404) log('⚠️ 활성 기기 없음 — 폰 Spotify에서 곡 재생 후 "↻"');
    else log('추천 실패 ['+(e.path||'?')+']: '+e.message);
  }
}

// ===== 즉시 vs 현재 곡 끝난 뒤 =====
function applyOrQueue(uris, force){
  if(force || !nowState.playing){
    pendingUris=null; forceFlag=true;   // 강제 교체 — 직전 곡은 완청 점수 안 줌
    setQueueAndPlay(uris).then(()=>log('새 추천 즉시 반영 ('+uris.length+'곡)'))
      .catch(e=>log('재생 실패: '+(e.message||e)));
  } else {
    pendingUris=uris;
    log('현재 곡 끝나면 반영 예정 ('+uris.length+'곡 대기)');
  }
}

// ===== 재생 상태 폴링 (3초) — UI·암묵학습·대기반영·곡전환 =====
async function pollPlayback(){
  if(!tokens.access) return;
  try{
    const j=await api('/me/player/currently-playing');
    if(!j || !j.item){ nowState.playing=false;
      $('npTitle').textContent='– Spotify 재생 대기 –'; $('npArtist').textContent='';
      $('npState').textContent='폰 Spotify에서 곡을 한 번 재생하세요'; return; }
    const tr=j.item, artist=(tr.artists&&tr.artists.map(a=>a.name).join(', '))||'';
    if(tr.uri!==lastUri){           // 곡 전환
      if(lastUri && !skipFlag && !forceFlag){ bumpFav(lastUri, 1.0); savePrefs(); log('완청 +1.0'); }  // 자연 종료 = 완청
      skipFlag=false; forceFlag=false;
      lastUri=tr.uri; lastArtist=(tr.artists&&tr.artists[0]&&tr.artists[0].name)||''; trackStartTs=Date.now();
    }
    nowState={ playing:j.is_playing, uri:tr.uri, dur:tr.duration_ms||0, prog:j.progress_ms||0, name:tr.name||'', artist };
    const img=(tr.album&&tr.album.images&&tr.album.images[0]&&tr.album.images[0].url)||'';
    if(img && $('art').src!==img) $('art').src=img;
    $('npTitle').textContent=tr.name||'';
    $('npArtist').textContent=artist;
    $('npState').textContent=(j.is_playing?'▶ 재생 중':'⏸ 일시정지')+(pendingUris?' · 다음 곡부터 새 무드 반영':'');
    // 대기 추천을 현재 곡 끝나는 시점에 반영
    if(pendingUris && nowState.dur>0 && nowState.dur-nowState.prog<=2500){
      const u=pendingUris; pendingUris=null; await setQueueAndPlay(u); log('현재 곡 종료 → 새 추천 반영');
    }
  }catch(e){ if(e.status===401) await refreshToken(); }
}
setInterval(pollPlayback, 3000);

// ===== 평가 =====
function rate(good){
  const uri=nowState.uri; if(!uri) return;
  if(good){
    bumpFav(uri, 1.0);   // 아티스트+장르 결합 카테고리 +1.0
    prefs.liked[uri]={ name:nowState.name||(candMeta[uri]&&candMeta[uri].name)||uri, artist:nowState.artist||'' };
    log('👍 좋아요 '+(nowState.name||'')); savePrefs();
  } else {
    skipNext();   // 👎 = 스킵과 동일 (제외 + 감점 + 다음곡)
  }
}

  curContext.tod=timeOfDay(); render();
  const sig=signature(curContext);
  if(force || sig!==lastSignature){
    lastSignature=sig;
    log('상황 변화 → '+sig); await searchAndPlay(force);
  }
}

    .filter(Boolean).map(p=>`<span class="pill">${p}</span>`).join('');

// ===== 위치 콜백 =====
function onPos(p){
  $('gpsDot').classList.add('on'); $('gpsTxt').textContent='GPS 연결됨';
  const lat=p.coords.latitude, lon=p.coords.longitude, t=p.timestamp;
  let kmh;
  if(p.coords.speed!=null && !isNaN(p.coords.speed)) kmh=p.coords.speed*3.6;
  else if(lastFix){ const d=haversine(lastFix,{lat,lon}); const dt=(t-lastFix.t)/1000; kmh=dt>0?(d/dt)*3.6:0; }
  else kmh=0;
  if(kmh<0||kmh>250) kmh=0;
  speedSamples.push(kmh); if(speedSamples.length>5) speedSamples.shift();
  curContext.speedKmh=speedSamples.reduce((a,b)=>a+b,0)/speedSamples.length;
  lastFix={lat,lon,t};
  const now=Date.now();
  if(now-geocodeTs>90000 || !curContext.weather){
    geocodeTs=now;
    fetchWeather(lat,lon).then(w=>{ if(w){curContext.weather=w; updateContext(false);} });
    fetchPlace(lat,lon).then(pl=>{ if(pl){curContext.place=pl; curContext.placeType=pl.type; updateContext(false);} });
  }
  updateContext(false);
}
function onPosErr(e){ $('gpsTxt').textContent='GPS 오류: '+e.message; log('GPS 오류: '+e.message); }

// 우리 목록 기준으로 다음 곡부터 다시 재생 (Spotify 원격 next가 안 먹히는 환경 대비)
async function skipNext(){
  const uri=nowState.uri;
  if(uri){
    const listen = trackStartTs ? (Date.now()-trackStartTs)/1000 : 999;
    const pen = listen<10 ? 1.0 : (listen<60 ? 0.5 : 0.3);   // 청취시간별 감점
    prefs.blocked[uri] = nowState.name || (candMeta[uri]&&candMeta[uri].name) || uri;  // 제외
    penalizeFav(uri, pen);   // 이미 점수 있는 결합 카테고리만 감점
    skipFlag=true; savePrefs();
    log('⏭ 다음곡=싫어요 '+Math.round(listen)+'초 (-'+pen+')');
  }
  try{
    if(queueUris.length){
      const pos=uri?queueUris.indexOf(uri):-1;
      let next=pos+1; if(next>=queueUris.length) next=0;
      await playUris(queueUris.slice(next));
    } else {
      await api('/me/player/next'+(deviceId?('?device_id='+deviceId):''),{method:'POST'});
    }
    setTimeout(pollPlayback, 700);
  }catch(e){ log('스킵 실패: '+e.message); }
}
$('skipBtn').addEventListener('click', skipNext);
$('refreshBtn').addEventListener('click', ()=>updateContext(true));
function bindGenreInput(id, which){
  const el=$(id), listId=which==='inc'?'genreIncList':'genreExcList';
  el.addEventListener('input', ()=> filterGenres(which, el.value));
  el.addEventListener('focus', ()=> filterGenres(which, el.value));
  el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); addGenre(which, el.value); el.value=''; $(listId).classList.remove('on'); } });
}
bindGenreInput('genreInc','inc'); bindGenreInput('genreExc','exc');
document.addEventListener('click', e=>{
  const opt=e.target.closest('[data-gadd]');
  if(opt){ const v=opt.getAttribute('data-gadd'); const i=v.indexOf(':::'); const which=v.slice(0,i), g=v.slice(i+3);
    addGenre(which, g); $(which==='inc'?'genreInc':'genreExc').value=''; $(which==='inc'?'genreIncList':'genreExcList').classList.remove('on'); return; }
  const c=e.target.closest('[data-gdel]');
  if(c){ e.preventDefault(); const p=c.getAttribute('data-gdel').split(':'); removeGenre(p[0], +p[1]); return; }
  if(!e.target.closest('#genreInc,#genreExc,.gdrop')){ $('genreIncList').classList.remove('on'); $('genreExcList').classList.remove('on'); }
});
$('genreApply').addEventListener('click', ()=>{ log('장르 필터 적용 → 재추천'); updateContext(true); });
$('prefToggle').addEventListener('click', ()=>{
  const p=$('prefPanel'); const open=p.style.display==='none';
  p.style.display=open?'block':'none'; $('prefToggle').textContent=open?'취향 목록 닫기':'취향 목록 보기';
  if(open) renderPrefPanel();
});
$('prefPanel').addEventListener('click', async e=>{
  const q=e.target.closest('[data-queue]');
  const u=e.target.closest('[data-unblock]');
  const df=e.target.closest('[data-delfav]');
  const dl=e.target.closest('[data-delliked]');
  if(q){ e.preventDefault(); const uri=q.getAttribute('data-queue');
    try{ await api('/me/player/queue?uri='+encodeURIComponent(uri)+(deviceId?('&device_id='+deviceId):''),{method:'POST'}); log('다음 큐에 추가'); }
    catch(err){ log('큐 추가 실패: '+(err.message||err)); } return; }
  if(u){ e.preventDefault(); delete prefs.blocked[u.getAttribute('data-unblock')]; log('차단 해제'); savePrefs(); }
  else if(df){ e.preventDefault(); delete prefs.fav[df.getAttribute('data-delfav')]; log('선호 삭제'); savePrefs(); }
  else if(dl){ e.preventDefault(); delete prefs.liked[dl.getAttribute('data-delliked')]; log('좋아요 삭제'); savePrefs(); }
});

// ===== 초기화 =====
(async function init(){
  $('ver').textContent=VERSION; $('redir').textContent=REDIRECT; renderPref();
  const saved=localStorage.getItem('sp_cid'); if(saved) $('clientId').value=saved;
  renderGenreChips();
  const params=new URLSearchParams(location.search);
  if(params.get('code')){
    await exchangeCode(params.get('code'));
    history.replaceState({}, '', REDIRECT);   // URL에서 code 제거
  }
  if(tokens.access){ showReady(true); showProfile(); pickDevice(); log('빌드 '+VERSION+' — Spotify 연결됨. 폰 Spotify 앱을 켠 뒤 주행 시작.'); }
  else { showReady(false); log('빌드 '+VERSION+' — Client ID 입력 후 Spotify 로그인.'); }
})();
</script>
